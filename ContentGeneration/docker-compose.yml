services:
  postgres:
    image: postgres:16
    container_name: contentpilot-postgres
    restart: always
    environment:
      POSTGRES_DB: contentpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: contentpilot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: contentpilot-searxng
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/

  backend:
    build: .
    container_name: contentpilot-backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - searxng
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/contentpilot
      - REDIS_URL=redis://redis:6379/0
      - SEARXNG_URL=http://searxng:8080
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: contentpilot-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data: